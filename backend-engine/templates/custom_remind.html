<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>YourAI Enterprise Notification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:wght@500;700&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #FAF9F6;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #FFFFFF;
            border: 1px solid #EAE6DF;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        .header {
            background-color: #111111;
            padding: 40px 30px;
            text-align: center;
            border-bottom: 2px solid #D4AF37;
        }
        .logo-text {
            font-family: 'Playfair Display', serif;
            color: #D4AF37;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0;
        }
        .content {
            padding: 50px 40px;
        }
        .greeting {
            font-size: 18px;
            font-weight: 500;
            color: #111111;
            margin-bottom: 20px;
        }
        .message-body {
            font-size: 15px;
            line-height: 1.8;
            color: #1A1A1A;
            margin-bottom: 30px;
        }
        .button-container {
            text-align: center;
            margin: 40px 0;
        }
        .btn-luxury {
            display: inline-block;
            background-color: #D4AF37;
            color: #FFFFFF;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }
        .footer {
            background-color: #FAFAFA;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #EAE6DF;
        }
        .footer-text {
            font-size: 12px;
            color: #7A7A7A;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo-text">YourAI v4.0</h1>
        </div>
        <div class="content">
            <div class="message-body">
                {{ custom_html | safe }}
            </div>
            {% if action_url %}
            <div class="button-container">
                <a href="{{ action_url }}" class="btn-luxury">Truy Cập Hệ Thống</a>
            </div>
            {% endif %}
        </div>
        <div class="footer">
            <p class="footer-text">Hệ thống YourAI Enterprise Edition &bull; Kỹ sư trưởng Long Quan Ton</p>
            <p class="footer-text">&copy; 2026 YourAI Inc. Bảo lưu mọi quyền.</p>
        </div>
    </div>
</body>
</html>
